name: Autonomous IDX Analyst Agent

on:
  schedule:
    # Run every 30 minutes during market hours (9:00 AM - 4:00 PM WIB)
    - cron: '*/30 2-9 * * 1-5'  # UTC hours for WIB 9:00-16:00
    # Run every hour outside market hours
    - cron: '0 * * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  autonomous-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Autonomous Agent
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        AGENT_MODE: autonomous
        LOG_LEVEL: INFO
      run: |
        python autonomous_agent.py
        
    - name: Upload agent logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: agent-logs-${{ github.run_number }}
        path: agent.log
        retention-days: 7
